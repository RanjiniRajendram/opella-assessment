name: Terraform Deploy

on:
  pull_request:
  push:
    branches:
      - main

env:
  TERRAFORM_VERSION: 1.6.0
  AZURE_BACKEND_RG: tfstate-rg
  AZURE_BACKEND_ACCOUNT: tfstategepassessment
  AZURE_BACKEND_CONTAINER: tfstate

permissions:
  id-token: write
  contents: read

jobs:
  # ==============================================================================
  # PR Validation: Format & syntax check (no Azure login)
  # ==============================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Validate Syntax
        run: |
          for env in terraform/environments/*/; do
            terraform -chdir=$env init -backend=false
            terraform -chdir=$env validate
          done
          for module in terraform/modules/*/; do
            terraform -chdir=$module init -backend=false
            terraform -chdir=$module validate
          done

  # ==============================================================================
  # Module Tests & Docs (PR only)
  # ==============================================================================
  test:
    name: Module Tests & Docs
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Module Tests
        working-directory: terraform/modules/vnet
        run: |
          terraform init -backend=false
          terraform test -verbose

      - name: Install terraform-docs
        run: |
          curl -sL https://github.com/terraform-docs/terraform-docs/releases/download/v0.18.0/terraform-docs-v0.18.0-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Automate Documentation
        working-directory: terraform
        run: terraform-docs markdown table . --output-file README.md --output-mode=inject
  # ==============================================================================
  # Plan: Show changes (no apply on PR)
  # ==============================================================================
  plan:
    name: Plan - ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        env: [dev, qa, prod]

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          terraform init 

      - name: Terraform Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform plan

  # ==============================================================================
  # Deploy: dev & qa (auto) + prod (approval required)
  # ==============================================================================
  deploy:
    name: Deploy - ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: [validate, test, plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'pull_request' == true

    strategy:
      matrix:
        env: [dev, qa]

    environment:
      name: ${{ matrix.env }}

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          terraform init 

      - name: Terraform Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ==============================================================================
  # Production Deploy: Requires approval
  # ==============================================================================
  deploy-prod:
    name: Deploy - Production
    runs-on: ubuntu-latest
    needs: [validate, test, plan, deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: prod

    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init 

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan